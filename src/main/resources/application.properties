spring.application.name=telephony-pricing
spring.application.prefix=telephony-pricing
abacox.permission.prefix=tp
info.build.artifact=@project.artifactId@
info.build.name=@project.name@
info.build.description=@project.description@
info.build.version=@project.version@

#DB CONFIG
spring.jpa.hibernate.ddl-auto=none
spring.sql.init.mode=always
spring.sql.init.platform=postgres
spring.datasource.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.datasource.jdbcUrl=${spring.datasource.url}
spring.datasource.url=jdbc:postgresql://localhost:5432/abacox-telephony-pricing3?useUnicode=yes&characterEncoding=UTF-8&reWriteBatchedInserts=true
spring.jpa.properties.hibernate.jdbc.time_zone=America/Bogota
spring.datasource.username=postgres
spring.datasource.password=betax964566
#spring.datasource.url=jdbc:postgresql://172.16.4.70:32884/telephony-pricingdb?useUnicode=yes&characterEncoding=UTF-8
#spring.datasource.username=user
#spring.datasource.password=password
spring.jpa.properties.hibernate.hbm2ddl.schema_filter_provider=com.infomedia.abacox.telephonypricing.db.util.AnnotationBasedSchemaFilterProvider
spring.datasource.hikari.maximum-pool-size=30
spring.datasource.hikari.connection-timeout=60000
spring.jpa.properties.hibernate.jdbc.batch_size=100
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true
#spring.datasource.hikari.leak-detection-threshold=5000

# Enable Schema Multi-tenancy settings
spring.flyway.enabled=false
spring.liquibase.enabled=false
spring.jpa.properties.hibernate.multiTenancy=SCHEMA
spring.jpa.open-in-view=false
abacox.multitenancy.entity-package=com.infomedia.abacox.telephonypricing.db.entity
abacox.multitenancy.hibernate-dialect=${spring.datasource.dialect}
abacox.multitenancy.ignored-objects=view:v_corporate_report

#HTTP config
server.port=3030
server.forward-headers-strategy=framework

#Language config
spring.messages.fallback-to-system-locale=false
spring.web.locale=en
spring.web.locale-resolver=fixed

# Set maximum file upload size to 2GB
spring.servlet.multipart.max-file-size=2GB
spring.servlet.multipart.max-request-size=2GB

#Logging config
app.log.dir=logs
logging.level.org.springframework.amqp.rabbit.connection.CachingConnectionFactory=ERROR
logging.level.org.springframework.amqp.rabbit.listener.SimpleMessageListenerContainer=OFF
logging.level.org.springframework.amqp.rabbit.core.RabbitAdmin=OFF
#logging.level.com.infomedia.abacox.telephonypricing.component.cdrprocessing=DEBUG
#logging.level.com.infomedia.abacox.telephonypricing.component.migration=DEBUG

#Swagger config
springdoc.swagger-ui.operationsSorter=alpha
springdoc.swagger-ui.tagsSorter=alpha
springdoc.swagger-ui.doc-expansion=none
springdoc.remove-broken-reference-definitions=false
springdoc.model-and-view-allowed=true
springdoc.swagger-ui.server-url=

# RabbitMQ Configuration
spring.rabbitmq.host=${SPRING_RABBITMQ_HOST:localhost}
spring.rabbitmq.port=${SPRING_RABBITMQ_PORT:5672}
spring.rabbitmq.username=${SPRING_RABBITMQ_USERNAME:abacox}
spring.rabbitmq.password=${SPRING_RABBITMQ_PASSWORD:abacox}

# Abacox config
abacox.orchestrator-url=http://localhost:8080
abacox.internal-api-key=441e5d28-dea8-49ce-ad7d-da50f830cb2f
abacox.base-url=

# OAuth2 Resource Server (JWTs issued by abacox-users, signed with RS256)
# Values are overridden by env vars (SPRING_SECURITY_...) in deployed environments.
spring.security.oauth2.resourceserver.jwt.jwk-set-uri=http://localhost:7071/.well-known/jwks.json
spring.security.oauth2.resourceserver.jwt.audiences=${spring.application.name}

# MinIO Configuration
minio.url=http://localhost:9020
minio.access-key=admin
minio.secret-key=password
minio.bucket-prefix=abacox-${spring.application.name}-

# CDR Processing Config
app.cdr.processing.enabled=true

# CDR Folder Polling Config
app.cdr.folder.enabled=true
app.cdr.folder.root-dir=/app/data/cdr-root
app.cdr.folder.poll-interval-ms=30000
app.cdr.folder.ignored-extensions=bin
spring.data.web.pageable.max-page-size=10000

# Suppress noisy Liquibase logs
logging.level.liquibase=WARN
